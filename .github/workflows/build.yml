name: build

# Builds run on every push (so pushing from GitHub Desktop produces a fresh
# Windows .exe you can download from the Actions tab), on pull requests, and
# manually. Pushing a version tag like v1.0.1 additionally publishes a Release
# with the built binaries attached.
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run batteryless patcher tests
        run: python scripts/test_bl_patcher.py
      - name: Run SRAM patcher and pipeline tests
        run: python scripts/test_sram_patcher.py
      - name: Run flash patcher tests
        run: python scripts/test_flash_patcher.py
      - name: Run GBxCart device protocol tests
        run: python scripts/test_gbxcart.py
      - name: Run title-resolver tests
        run: python scripts/test_titles.py
      - name: Run verification tests
        run: python scripts/test_verify.py
      - name: Run save-compare tests
        run: python scripts/test_savecompare.py
      - name: Run cart-compatibility tests
        run: python scripts/test_cart_compat.py
      - name: Run updater tests
        run: python scripts/test_updater.py
      - name: Run ROM patch tests
        run: python scripts/test_rompatch.py
      - name: Run cheat code tests
        run: python scripts/test_cheats.py

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Cartographer-windows
          - os: macos-latest
            artifact: Cartographer-macos
          - os: ubuntu-latest
            artifact: Cartographer-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Linux Qt runtime libraries
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 \
            libdbus-1-3 libxcb-cursor0

      - name: Set fallback version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building tagged release version: $VERSION"
          # The app reads its version from CHANGELOG.md's top heading; this just
          # keeps the last-resort fallback constant in sync with the tag too.
          python - "$VERSION" <<'PY'
          import re, sys
          version = sys.argv[1]
          path = "cartographer/__init__.py"
          text = open(path, encoding="utf-8").read()
          text = re.sub(r'_FALLBACK_VERSION\s*=\s*["\'][^"\']*["\']',
                        f'_FALLBACK_VERSION = "{version}"', text)
          open(path, "w", encoding="utf-8").write(text)
          print(f"_FALLBACK_VERSION set to {version}")
          PY

      - name: Build
        run: pyinstaller --noconfirm Cartographer.spec

      - name: Stage Windows binary
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p out
          cp dist/Cartographer.exe out/Cartographer-windows.exe

      - name: Stage Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p out
          cp dist/Cartographer out/Cartographer-linux
          chmod +x out/Cartographer-linux

      - name: Stage macOS app
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p out
          cd dist
          zip -r ../out/Cartographer-macos.zip Cartographer.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/*
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Extract changelog for this version
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Looking for section: ## $VERSION"
          # Pull the block under "## vX.Y.Z" up to the next "## " heading.
          BODY=$(awk -v ver="## $VERSION" '
            $0 == ver {grab=1; next}
            grab && /^## / {exit}
            grab {print}
          ' CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="See CHANGELOG.md for details."
          fi
          # Expose multi-line output to the release step.
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: ${{ steps.notes.outputs.body }}
